<style>
  :root{
    --s-blue-dark:#1c3664;
    --s-blue-mid:#1a5276;
    --s-blue-light:#2e86c1;
    --s-blue-pale:#d6eaf8;
    --s-bg:#f4f6f8;
    --s-text-primary:#1a1a2e;
    --s-text-muted:#5d6d7e;
    --s-border:#d5d8dc;
    --s-red:#c0392b;
    --s-green:#1e8449;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    background:var(--s-bg);
    color:var(--s-text-primary);
  }
  header{
    background:var(--s-blue-dark);
    color:#fff;
    padding:18px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
  }
  header .title{display:flex;flex-direction:column;}
  header .title h1{margin:0;font-size:20px;font-weight:600;}
  header .title span{font-size:12.5px;color:var(--s-blue-pale);}
  header .actions{display:flex;gap:8px;flex-wrap:wrap;}
  .container{max-width:1180px;margin:0 auto;padding:24px 20px 60px;}
  .card{
    background:#fff;
    border:1px solid var(--s-border);
    border-radius:8px;
    padding:22px 24px;
    margin-bottom:20px;
  }
  .card h2{
    margin:0 0 14px 0;
    font-size:16px;
    color:var(--s-blue-dark);
    border-bottom:2px solid var(--s-blue-pale);
    padding-bottom:8px;
  }
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--s-text-muted);margin-bottom:5px;}
  input[type=text],input[type=date],textarea,select{
    width:100%;
    padding:9px 10px;
    border:1px solid var(--s-border);
    border-radius:4px;
    font-size:13.5px;
    font-family:inherit;
    color:var(--s-text-primary);
    background:#fff;
  }
  input:focus,textarea:focus,select:focus{outline:2px solid var(--s-blue-light);outline-offset:1px;}
  .field{margin-bottom:14px;}
  .checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .checkbox-row input{width:16px;height:16px;}
  .checkbox-row label{margin:0;font-weight:600;color:var(--s-text-primary);}

  button{
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    border-radius:4px;
    border:1px solid transparent;
    padding:9px 16px;
    cursor:pointer;
    transition:opacity .15s;
  }
  button:hover{opacity:.88;}
  .btn-primary{background:var(--s-blue-light);color:#fff;}
  .btn-dark{background:var(--s-blue-dark);color:#fff;}
  .btn-outline{background:#fff;color:var(--s-blue-dark);border:1px solid var(--s-blue-dark);}
  .btn-ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.6);}
  .btn-small{padding:5px 10px;font-size:12px;}
  .btn-danger{background:#fff;color:var(--s-red);border:1px solid var(--s-red);}

  .dept-block{border:1px solid var(--s-border);border-radius:4px;margin-bottom:10px;overflow:hidden;}
  .dept-header{
    background:var(--s-blue-pale);
    padding:9px 12px;
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
    font-weight:600;
    color:var(--s-blue-dark);
    font-size:13.5px;
  }
  .dept-items{padding:6px 12px 10px 34px;}
  .item-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px dashed var(--s-border);font-size:13px;}
  .item-row:last-child{border-bottom:none;}
  .item-row input{margin-top:3px;}
  .item-row .meta{color:var(--s-text-muted);font-size:12px;}
  .badge{
    display:inline-block;
    font-size:10.5px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.03em;
    padding:2px 7px;
    border-radius:10px;
    margin-left:6px;
  }
  .badge-lead{background:var(--s-blue-dark);color:#fff;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{
    background:var(--s-blue-dark);
    color:#fff;
    text-align:left;
    padding:9px 10px;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.02em;
  }
  td{padding:9px 10px;border-bottom:1px solid var(--s-border);vertical-align:top;}
  tr.done td{background:#f2f9f4;}
  tr.overdue td{background:#fdf1ef;}
  .phase-row td{
    background:var(--s-blue-pale);
    font-weight:700;
    color:var(--s-blue-dark);
    padding:7px 10px;
    font-size:12.5px;
    text-transform:uppercase;
  }
  .status-pill{
    display:inline-block;
    font-size:11px;
    font-weight:700;
    padding:3px 9px;
    border-radius:10px;
  }
  .status-open{background:var(--s-border);color:var(--s-text-muted);}
  .status-due{background:#fdebd0;color:#9a6a00;}
  .status-overdue{background:#fadbd8;color:var(--s-red);}
  .status-done{background:#d5f2df;color:var(--s-green);}

  .progress-wrap{margin-bottom:18px;}
  .progress-bar{background:var(--s-border);border-radius:8px;height:16px;overflow:hidden;}
  .progress-fill{background:var(--s-green);height:100%;transition:width .3s;}
  .progress-label{font-size:12.5px;color:var(--s-text-muted);margin-top:5px;}

  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .hint{font-size:12px;color:var(--s-text-muted);margin-top:4px;}
  .link-chip{
    display:inline-block;
    font-size:11.5px;
    color:var(--s-blue-mid);
    text-decoration:none;
    border:1px solid var(--s-blue-pale);
    background:var(--s-blue-pale);
    padding:2px 8px;
    border-radius:10px;
    margin:2px 4px 0 0;
  }
  textarea.notes{min-height:36px;font-size:12.5px;resize:vertical;}
  .col-check{width:34px;text-align:center;}
  .col-name{width:130px;}
  .col-date{width:120px;}
  .col-status{width:110px;}
  .empty-state{text-align:center;padding:40px 20px;color:var(--s-text-muted);}
  .signature-block{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-top:20px;}
  .signature-block div{border-top:1px solid var(--s-text-primary);padding-top:6px;font-size:12px;color:var(--s-text-muted);}
  #fileInput{display:none;}

  @media print{
    header .actions, .toolbar, .no-print, .item-row input, td.col-check-input{display:none !important;}
    body{background:#fff;}
    .card{border:none;box-shadow:none;padding:0;margin-bottom:14px;}
    header{background:#fff !important;color:var(--s-blue-dark) !important;border-bottom:2px solid var(--s-blue-dark);}
    header .title span{color:var(--s-text-muted);}
    table{font-size:11px;}
    th{background:var(--s-blue-dark) !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .phase-row td{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  }
  @media (max-width:720px){
    .grid2,.grid3{grid-template-columns:1fr;}
    .signature-block{grid-template-columns:1fr;}
  }
</style>
</head>

let uidCounter = 1;
function uid(){ return "c"+(uidCounter++); }

/* Build the flat catalogue of selectable items (with stable ids) used on the select screen */
function buildCatalogue(){
  const cat = [];
  GENERAL_ITEMS.forEach(it=>{
    cat.push({...it, catId:it.id, group:"Allgemeine Einführung (obligatorisch für alle)"});
  });
  Object.keys(FUNCTIONAL_GROUPS).forEach(dept=>{
    FUNCTIONAL_GROUPS[dept].forEach((it,idx)=>{
      cat.push({...it, catId:"f_"+dept.replace(/[^a-zA-Z0-9]/g,"")+"_"+idx, abteilung:dept, group:"Funktionsbezogen"});
    });
  });
  ACADEMY_ITEMS.forEach((it,idx)=>{
    cat.push({...it, catId:"a_"+idx, abteilung:it.wer, group:"Academy / Culture"});
  });
  return cat;
}
const CATALOGUE = buildCatalogue();
function fullCatalogue(){ return CATALOGUE.concat(state.customItems); }

function addDays(dateStr, days){
  if(!dateStr) return "";
  const d = new Date(dateStr+"T00:00:00");
  d.setDate(d.getDate()+days);
  return d.toISOString().slice(0,10);
}
function fmtDate(dateStr){
  if(!dateStr) return "–";
  const d = new Date(dateStr+"T00:00:00");
  return d.toLocaleDateString("de-CH",{day:"2-digit",month:"2-digit",year:"numeric"});
}
function todayStr(){ return new Date().toISOString().slice(0,10); }

function phaseLabel(offset){
  if(offset<=0) return "Erster Arbeitstag";
  if(offset<=14) return "Erste 2 Wochen";
  if(offset<=30) return "Erster Monat";
  if(offset<=90) return "Erste 3 Monate";
  return "3 bis 6 Monate";
}

function computeStatus(item){
  if(item.done) return "done";
  if(!state.meta.startdatum) return "open";
  const target = addDays(state.meta.startdatum, item.offset);
  if(!target) return "open";
  const t = todayStr();
  if(target < t) return "overdue";
  const soon = addDays(t, 7);
  if(target <= soon) return "due";
  return "open";
}
const STATUS_LABEL = {open:"Offen",due:"Bald fällig",overdue:"Überfällig",done:"Erledigt"};

function escapeHtml(s){
  return String(s??"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* ============================================================
   RENDER: HEADER
   ============================================================ */

function renderHeader(){
  const sub = document.getElementById("headerSub");
  const actions = document.getElementById("headerActions");
  actions.innerHTML = "";
  if(state.view==="setup"){
    sub.textContent = "Generator & Tracker für neue Mitarbeitende";
  } else if(state.view==="select"){
    sub.textContent = "Themen auswählen für " + (state.meta.name || "neue Mitarbeitende");
    actions.innerHTML = `<button class="btn-ghost" id="btnBackSetup">Zurück</button>`;
  } else if(state.view==="tracker"){
    sub.textContent = (state.meta.name||"Neue Mitarbeitende") + (state.meta.funktion ? " · "+state.meta.funktion : "");
    actions.innerHTML = `
      <button class="btn-ghost" id="btnAddCustom">+ Eigenes Thema</button>
      <button class="btn-ghost" id="btnExportJson">JSON Export</button>
      <button class="btn-ghost" id="btnImportJson">JSON Import</button>
      <button class="btn-ghost" id="btnPdf">PDF Export</button>
      <button class="btn-ghost" id="btnNewSetup">Neu erstellen</button>
    `;
  }
}

/* ============================================================
   RENDER: SETUP SCREEN
   ============================================================ */

  app.innerHTML = `
    <div class="card">
      <h2>1. Angaben zur / zum neuen Mitarbeitenden</h2>
      <div class="grid2">
        <div class="field">
          <label for="inName">Name</label>
          <input type="text" id="inName" placeholder="Vorname Nachname" value="${escapeHtml(state.meta.name)}">
        </div>
        <div class="field">
          <label for="inFunktion">Funktion</label>
          <input type="text" id="inFunktion" placeholder="z. B. Requirement Engineer" value="${escapeHtml(state.meta.funktion)}">
        </div>
      </div>
      <div class="grid2">
        <div class="field">
          <label for="inAbteilung">Abteilung</label>
          <input type="text" id="inAbteilung" list="deptList" placeholder="z. B. R&D" value="${escapeHtml(state.meta.abteilung)}">
          <datalist id="deptList">
            ${Object.keys(FUNCTIONAL_GROUPS).map(d=>`<option value="${escapeHtml(d)}">`).join("")}
          </datalist>
          <div class="hint">Steuert die Vorauswahl der funktionsbezogenen Themen im nächsten Schritt.</div>
        </div>
        <div class="grid2">
        <div class="field">
          <label for="inStart">Startdatum</label>
          <input type="date" id="inStart" value="${escapeHtml(state.meta.startdatum)}">
        </div>
        <div class="field">
          <label for="inPate">Pate / Buddy</label>
          <input type="text" id="inPate" placeholder="Name des Paten" value="${escapeHtml(state.meta.pate)}">
        </div>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="inLeitung" ${state.meta.fuehrungskraft?"checked":""}>
        <label for="inLeitung">Führungskraft (blendet zusätzliche Leadership-Themen ein)</label>
      </div>
      <button class="btn-primary" id="btnWeiter">Weiter zur Themenauswahl</button>
    </div>
  `;
  document.getElementById("btnWeiter").onclick = ()=>{
    state.meta.name = document.getElementById("inName").value.trim();
    state.meta.funktion = document.getElementById("inFunktion").value.trim();
    state.meta.abteilung = document.getElementById("inAbteilung").value.trim();
    state.meta.startdatum = document.getElementById("inStart").value;
    state.meta.pate = document.getElementById("inPate").value.trim();

/* ============================================================
   RENDER: SELECT SCREEN
   ============================================================ */

function initSelection(){
  state.selection = {};
  fullCatalogue().forEach(it=>{
    let checked = false;
    if(it.group==="Eigene Themen"){
      checked = true;
    } else if(it.group.startsWith("Allgemeine")){
      checked = !(it.leadershipOnly && !state.meta.fuehrungskraft);
    } else if(it.group==="Funktionsbezogen"){
      checked = state.meta.abteilung && it.abteilung.toLowerCase().includes(state.meta.abteilung.toLowerCase());
    } else if(it.group==="Academy / Culture"){
      checked = it.leadershipOnly ? state.meta.fuehrungskraft : false;
    }
    state.selection[it.catId] = checked;
  });
}

function renderSelect(){
  const app = document.getElementById("app");
  const catalogue = fullCatalogue();
  const groups = {};
  catalogue.forEach(it=>{
    const g = it.group==="Funktionsbezogen" ? "Funktionsbezogen · "+it.abteilung : it.group;
    (groups[g] = groups[g]||[]).push(it);
  });

  let html = `<div class="card">
    <h2>2. Themen auswählen</h2>
    <div class="hint" style="margin-bottom:14px;">
      Allgemeine Themen sind für alle obligatorisch vorausgewählt. Funktionsbezogene Themen wurden anhand der Abteilung
      "${escapeHtml(state.meta.abteilung)||"–"}" vorselektiert. Passe die Auswahl bei Bedarf an oder ergänze eigene Themen.
    </div>
    <button class="btn-outline no-print" id="btnAddCustomSelect" style="margin-bottom:16px;">+ Eigenes Thema hinzufügen</button>`;

  Object.keys(groups).sort((a,b)=>{
    const order = g=>g.startsWith("Allgemeine")?0:g.startsWith("Academy")?2:g.startsWith("Eigene")?3:1;
    return order(a)-order(b) || a.localeCompare(b);
  }).forEach(g=>{
    html += `<div class="dept-block">
      <div class="dept-header" data-toggle="${escapeHtml(g)}">
        <input type="checkbox" class="group-toggle" data-group="${escapeHtml(g)}">
        <span>${escapeHtml(g)}</span>
      </div>
      <div class="dept-items">`;
    groups[g].forEach(it=>{
      html += `<div class="item-row">
        <input type="checkbox" class="item-toggle" data-id="${it.catId}" ${state.selection[it.catId]?"checked":""}>
        <div style="flex:1;">
          <div><strong>${escapeHtml(it.thema)}</strong>${it.leadershipOnly?'<span class="badge badge-lead">Führung</span>':""}</div>
          <div class="meta">${escapeHtml(it.wer)} · ${escapeHtml(it.dauer||"")} · ${escapeHtml(it.empfehlung||"")}</div>
        </div>
        ${g==="Eigene Themen"?`<button class="btn-danger btn-small no-print" data-remove-custom="${it.catId}">Entfernen</button>`:""}
      </div>`;
    });
    html += `</div></div>`;
  });

  html += `<button class="btn-primary" id="btnGenerate" style="margin-top:8px;">Einführungsprogramm generieren</button>
  </div>`;
  app.innerHTML = html;

  app.querySelectorAll(".item-toggle").forEach(cb=>{
    cb.addEventListener("change",()=>{ state.selection[cb.dataset.id] = cb.checked; syncGroupToggles(); });
  });
  app.querySelectorAll(".dept-header").forEach(h=>{
    h.addEventListener("click",(e)=>{
      if(e.target.classList.contains("group-toggle")) return;
      const items = h.parentElement.querySelector(".dept-items");
      items.style.display = items.style.display==="none" ? "block" : "none";
    });
  });
  app.querySelectorAll(".group-toggle").forEach(gt=>{
    gt.addEventListener("click", e=>e.stopPropagation());
    gt.addEventListener("change",()=>{
      const g = gt.dataset.group;
      groups[g].forEach(it=>{ state.selection[it.catId] = gt.checked; });
      renderSelect();
    });
  });
  app.querySelectorAll("[data-remove-custom]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const id = btn.dataset.removeCustom;
      state.customItems = state.customItems.filter(it=>it.catId!==id);
      delete state.selection[id];
      renderSelect();
    });
  });
  syncGroupToggles();

  document.getElementById("btnAddCustomSelect").onclick = addCustomTopicAtSelection;

  document.getElementById("btnGenerate").onclick = ()=>{
    generateTracker();
    state.view = "tracker";
    render();
  };

  function syncGroupToggles(){
    app.querySelectorAll(".group-toggle").forEach(gt=>{
      const g = gt.dataset.group;
      const all = groups[g].every(it=>state.selection[it.catId]);
      gt.checked = all;
    });
  }
}

function addCustomTopicAtSelection(){
  const thema = prompt("Thema:");
  if(!thema) return;
  const wer = prompt("Wer ist zuständig (Rolle)?","");
  const offsetStr = prompt("Zieldatum: Tage nach Startdatum (z. B. 0, 14, 30, 90):","30");
  const offset = parseInt(offsetStr,10);
  const catId = "custom_"+uid();
  state.customItems.push({
    catId, thema, wer:wer||"", details:"", zeitOrt:"", dauer:"",
    empfehlung:"", offset:isNaN(offset)?30:offset, links:[],
    abteilung:"Individuell", group:"Eigene Themen",
  });
  state.selection[catId] = true;
  renderSelect();
}

/* ============================================================
   GENERATE TRACKER FROM SELECTION
   ============================================================ */

function generateTracker(){
  state.items = fullCatalogue()
    .filter(it=>state.selection[it.catId])
    .map(it=>({
      id: uid(),
      abteilung: it.abteilung,
      wer: it.wer,
      thema: it.thema,
      details: it.details,
      zeitOrt: it.zeitOrt||"",
      dauer: it.dauer||"",
      empfehlung: it.empfehlung||"",
      offset: it.offset,
      links: it.links||[],
      done:false,
      actualDate:"",
      notes:"",
      personName:"",
    }))
    .sort((a,b)=>a.offset-b.offset);
}

/* ============================================================
   RENDER: TRACKER SCREEN
   ============================================================ */

function renderTracker(){
  const app = document.getElementById("app");
  if(state.items.length===0){
    app.innerHTML = `<div class="card empty-state">Noch keine Themen ausgewählt. <br><button class="btn-primary" style="margin-top:12px;" id="btnGoSelect">Zur Themenauswahl</button></div>`;
    document.getElementById("btnGoSelect").onclick=()=>{state.view="select";render();};
    return;
  }

  const total = state.items.length;
  const done = state.items.filter(i=>i.done).length;
  const pct = Math.round((done/total)*100);

  let html = `<div class="card">
    <h2>Übersicht</h2>
    <div class="grid3" style="margin-bottom:16px;grid-template-columns:1fr 1fr 1fr 1fr;">
      <div><label>Mitarbeiter/in</label><div>${escapeHtml(state.meta.name)||"–"}</div></div>
      <div><label>Funktion</label><div>${escapeHtml(state.meta.funktion)||"–"}</div></div>
      <div><label>Startdatum</label><div>${fmtDate(state.meta.startdatum)}</div></div>
      <div><label>Pate / Buddy</label><div>${escapeHtml(state.meta.pate)||"–"}</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;"></div></div>
      <div class="progress-label">${done} von ${total} Themen erledigt (${pct}%)</div>
    </div>
  </div>`;

  const phases = [
    {max:0,label:"Erster Arbeitstag"},
    {max:14,label:"Erste 2 Wochen"},
    {max:30,label:"Erster Monat"},
    {max:90,label:"Erste 3 Monate"},
    {max:9999,label:"3 bis 6 Monate"},
  ];

  html += `<div class="card">
    <h2>Checkliste</h2>
    <table>
      <thead><tr>
        <th class="col-check">✓</th>
        <th>Abteilung</th>
        <th>Wer (Rolle)</th>
        <th class="col-name">Verantwortlich (Name)</th>
        <th>Thema &amp; Details</th>
        <th>Hilfsmittel</th>
        <th class="col-date">Zieldatum</th>
        <th class="col-date">Erledigt am</th>
        <th class="col-status">Status</th>
        <th>Notizen</th>
        <th></th>
      </tr></thead>
      <tbody>`;

  let lastPhase = null;
  state.items.forEach(item=>{
    const currentPhase = phases.find(p=>item.offset<=p.max).label;
    if(currentPhase!==lastPhase){
      html += `<tr class="phase-row"><td colspan="11">${currentPhase}</td></tr>`;
      lastPhase = currentPhase;
    }
    const target = state.meta.startdatum ? addDays(state.meta.startdatum, item.offset) : "";
    const status = computeStatus(item);
    const rowClass = item.done ? "done" : (status==="overdue" ? "overdue" : "");
    html += `<tr class="${rowClass}" data-id="${item.id}">
      <td class="col-check col-check-input"><input type="checkbox" class="chk-done" data-id="${item.id}" ${item.done?"checked":""}></td>
      <td>${escapeHtml(item.abteilung)}</td>
      <td>${escapeHtml(item.wer)}</td>
      <td><input type="text" class="in-person" data-id="${item.id}" value="${escapeHtml(item.personName)}" placeholder="Name eintragen" style="padding:5px;font-size:12px;"></td>
      <td><strong>${escapeHtml(item.thema)}</strong><div class="meta">${escapeHtml(item.details)}</div>${item.zeitOrt?`<div class="meta">${escapeHtml(item.zeitOrt)}${item.dauer?" · "+escapeHtml(item.dauer):""}</div>`:(item.dauer?`<div class="meta">${escapeHtml(item.dauer)}</div>`:"")}</td>
      <td>${(item.links||[]).map(l=>`<a class="link-chip" href="${escapeHtml(l.url)}" target="_blank" rel="noopener">${escapeHtml(l.text)}</a>`).join("")||"–"}</td>
      <td>${target?fmtDate(target):"–"}</td>
      <td><input type="date" class="in-actual" data-id="${item.id}" value="${item.actualDate}" style="padding:5px;font-size:12px;"></td>
      <td><span class="status-pill status-${status}">${STATUS_LABEL[status]}</span></td>
      <td><textarea class="notes in-notes" data-id="${item.id}" placeholder="Notiz…">${escapeHtml(item.notes)}</textarea></td>
      <td><button class="btn-danger btn-small no-print" data-remove="${item.id}">Entfernen</button></td>
    </tr>`;
  });

  html += `</tbody></table></div>`;

  html += `<div class="card">
    <h2>Unterschriften</h2>
    <div class="signature-block">
      <div>Mitarbeiter/in &nbsp; Datum: ${fmtDate(state.meta.startdatum)}</div>
      <div>Vorgesetzte/r</div>
      <div>HR Manager</div>
    </div>
  </div>`;

  app.innerHTML = html;

  app.querySelectorAll(".chk-done").forEach(cb=>{
    cb.addEventListener("change",()=>{
      const item = state.items.find(i=>i.id===cb.dataset.id);
      item.done = cb.checked;
      if(item.done && !item.actualDate) item.actualDate = todayStr();
      if(!item.done) item.actualDate = item.actualDate; // keep manual value
      renderTracker();
    });
  });
  app.querySelectorAll(".in-actual").forEach(inp=>{
    inp.addEventListener("change",()=>{
      const item = state.items.find(i=>i.id===inp.dataset.id);
      item.actualDate = inp.value;
      renderTracker();
    });
  });
  app.querySelectorAll(".in-person").forEach(inp=>{
    inp.addEventListener("input",()=>{
      const item = state.items.find(i=>i.id===inp.dataset.id);
      item.personName = inp.value;
    });
  });
  app.querySelectorAll(".in-notes").forEach(ta=>{
    ta.addEventListener("input",()=>{
      const item = state.items.find(i=>i.id===ta.dataset.id);
      item.notes = ta.value;
    });
  });
  app.querySelectorAll("[data-remove]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      state.items = state.items.filter(i=>i.id!==btn.dataset.remove);
      renderTracker();
    });
  });
}

/* ============================================================
   HEADER ACTIONS: custom item, export, import, pdf
   ============================================================ */

function addCustomItem(){
  const thema = prompt("Thema des neuen Punkts:");
  if(!thema) return;
  const wer = prompt("Wer ist zuständig?","");
  const offsetStr = prompt("Zieldatum: Tage nach Startdatum (z. B. 0, 14, 30, 90):","30");
  const offset = parseInt(offsetStr,10);
  state.items.push({
    id:uid(),
    abteilung:"Individuell",
    wer:wer||"",
    thema,
    details:"",
    zeitOrt:"",
    dauer:"",
    empfehlung:"",
    offset:isNaN(offset)?30:offset,
    links:[],
    done:false,
    actualDate:"",
    notes:"",
    personName:"",
  });
  state.items.sort((a,b)=>a.offset-b.offset);
  renderTracker();
}

function exportJson(){
  const payload = {
    exportedAt: new Date().toISOString(),
    meta: state.meta,
    items: state.items,
  };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const safeName = (state.meta.name||"mitarbeiter").toLowerCase().replace(/[^a-z0-9]+/g,"_");
  a.href = url;
  a.download = `einfuehrungsprogramm_${safeName}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function importJsonFile(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!data.items || !Array.isArray(data.items)) throw new Error("Ungültiges Format");
      state.meta = data.meta || state.meta;
      state.items = data.items;
      state.view = "tracker";
      render();
    }catch(err){
      alert("Die Datei konnte nicht geladen werden. Bitte ein gültiges Export-JSON verwenden.");
    }
  };
  reader.readAsText(file);
}

function exportPdf(){
  window.print();
}

/* ============================================================
   MAIN RENDER / EVENTS
   ============================================================ */

function render(){
  renderHeader();
  if(state.view==="setup") renderSetup();
  else if(state.view==="select") renderSelect();
  else if(state.view==="tracker") renderTracker();

  const b1 = document.getElementById("btnBackSetup");
  if(b1) b1.onclick = ()=>{ state.view="setup"; render(); };

  const b2 = document.getElementById("btnAddCustom");
  if(b2) b2.onclick = addCustomItem;

  const b3 = document.getElementById("btnExportJson");
  if(b3) b3.onclick = exportJson;

  const b4 = document.getElementById("btnImportJson");
  if(b4) b4.onclick = ()=> document.getElementById("fileInput").click();

  const b5 = document.getElementById("btnPdf");
  if(b5) b5.onclick = exportPdf;

  const b6 = document.getElementById("btnNewSetup");
  if(b6) b6.onclick = ()=>{
    if(confirm("Aktuelles Programm verwerfen und neu starten?")){
      state = {view:"setup",meta:{name:"",funktion:"",abteilung:"",startdatum:"",fuehrungskraft:false,pate:""},selection:{},customItems:[],items:[]};
      render();
    }
  };
}

document.getElementById("fileInput").addEventListener("change",(e)=>{
  if(e.target.files[0]) importJsonFile(e.target.files[0]);
  e.target.value = "";
});

render();
</script>
</body>
</html>
